<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>모음 페이지</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="moeum-page">
    <div class="moeum-stage">

      <!-- 기본 흐린 이미지 -->
      <img src="img/moeum.jpg" alt="모음 페이지" class="moeum-bg">

      <!-- 클릭 후 전체 선명 이미지 -->
      <div class="moeum-clear-full">
        <img src="img/moeum2.jpg" alt="선명한 모음 페이지">
      </div>

      <!-- 마우스를 올렸을 때 부분적으로 선명해지는 영역 -->
      <div class="moeum-hover tile-01"><img src="img/moeum2.jpg" alt=""></div>
      <div class="moeum-hover tile-02"><img src="img/moeum2.jpg" alt=""></div>
      <div class="moeum-hover tile-03"><img src="img/moeum2.jpg" alt=""></div>
      <div class="moeum-hover tile-04"><img src="img/moeum2.jpg" alt=""></div>
      <div class="moeum-hover tile-05"><img src="img/moeum2.jpg" alt=""></div>
      <div class="moeum-hover tile-06"><img src="img/moeum2.jpg" alt=""></div>

      <div class="moeum-hover tile-07"><img src="img/moeum2.jpg" alt=""></div>
      <div class="moeum-hover tile-08"><img src="img/moeum2.jpg" alt=""></div>
      <div class="moeum-hover tile-09"><img src="img/moeum2.jpg" alt=""></div>
      <div class="moeum-hover tile-10"><img src="img/moeum2.jpg" alt=""></div>
      <div class="moeum-hover tile-11"><img src="img/moeum2.jpg" alt=""></div>
      <div class="moeum-hover tile-12"><img src="img/moeum2.jpg" alt=""></div>

      <div class="moeum-hover tile-13"><img src="img/moeum2.jpg" alt=""></div>
      <div class="moeum-hover tile-14"><img src="img/moeum2.jpg" alt=""></div>
      <div class="moeum-hover tile-15"><img src="img/moeum2.jpg" alt=""></div>
      <div class="moeum-hover tile-16"><img src="img/moeum2.jpg" alt=""></div>
      <div class="moeum-hover tile-17"><img src="img/moeum2.jpg" alt=""></div>
      <div class="moeum-hover tile-18"><img src="img/moeum2.jpg" alt=""></div>

      <div class="moeum-hover tile-19"><img src="img/moeum2.jpg" alt=""></div>
      <div class="moeum-hover tile-20"><img src="img/moeum2.jpg" alt=""></div>
      <div class="moeum-hover tile-21"><img src="img/moeum2.jpg" alt=""></div>
      <div class="moeum-hover tile-22"><img src="img/moeum2.jpg" alt=""></div>
      <div class="moeum-hover tile-23"><img src="img/moeum2.jpg" alt=""></div>
      <div class="moeum-hover tile-24"><img src="img/moeum2.jpg" alt=""></div>

    </div>
  </main>

  <script>
  const moeumStage = document.querySelector('.moeum-stage');
  const moeumTiles = document.querySelectorAll('.moeum-hover');
  const clearFull = document.querySelector('.moeum-clear-full');

  // 모자이크 상태에서 각 이미지를 클릭하면 전체 선명하게
  moeumTiles.forEach(function(tile) {
    tile.addEventListener('click', function() {
      moeumStage.classList.add('is-clear');
    });
  });

  // 전체가 선명해진 상태에서 다시 클릭하면 모자이크 상태로 돌아가기
  clearFull.addEventListener('click', function() {
    moeumStage.classList.remove('is-clear');
  });
</script>

</body>
</html>
