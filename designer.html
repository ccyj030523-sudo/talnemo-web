<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>디자이너</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="designer-page">
    <div class="designer-stage">

      <img src="img/designer.jpg" alt="디자이너 페이지" class="designer-bg">

    </div>
  </main>

  <script>
    const designerPage = document.querySelector('.designer-page');
    const designerStage = document.querySelector('.designer-stage');

    // 검정 배경 여백 클릭 시 홈화면으로 이동
    designerPage.addEventListener('click', function() {
      window.location.href = 'index.html';
    });

    // 이미지 영역 클릭 시에는 이동하지 않도록 막기
    designerStage.addEventListener('click', function(event) {
      event.stopPropagation();
    });
  </script>

</body>
</html>
