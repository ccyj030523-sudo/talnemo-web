<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>디자이너</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="designer-page">
    <div class="designer-stage">

      <img src="img/designer.jpg" alt="디자이너 페이지" class="designer-bg">

    </div>
  </main>

  <script>
    const designerPage = document.querySelector('.designer-page');

    // 디자이너 페이지 아무 곳이나 클릭하면 홈화면으로 이동
    designerPage.addEventListener('click', function() {
      window.location.href = 'index.html';
    });
  </script>

</body>
</html>
