<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>탈네모꼴</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="home">

    <!-- 왼쪽 위 십자 표시 -->
    <div class="cross"></div>

    <!-- 전체 작업 영역 -->
    <section class="stage">

      <!-- 상단 자 -->
      <div class="ruler ruler-x">
        <span>-100</span>
        <span>0</span>
        <span>100</span>
        <span>200</span>
        <span>300</span>
        <span>400</span>
        <span>500</span>
        <span>600</span>
        <span>700</span>
        <span>800</span>
      </div>

      <!-- 왼쪽 자 -->
      <div class="ruler ruler-y">
        <span>900</span>
        <span>800</span>
        <span>700</span>
        <span>600</span>
        <span>500</span>
        <span>400</span>
        <span>300</span>
        <span>200</span>
        <span>100</span>
        <span>0</span>
        <span>-100</span>
        <span>-200</span>
        <span>-300</span>
      </div>

      <!-- 기준선 -->
      <div class="guide guide-v guide-v-1"></div>
      <div class="guide guide-v guide-v-2"></div>
      <div class="guide guide-h guide-h-1"></div>
      <div class="guide guide-h guide-h-2"></div>
      <div class="guide guide-h guide-h-3"></div>
      <div class="guide guide-h guide-h-4"></div>

      <!-- 글자 영역 -->
      <div class="letter-wrap">

        <!-- ㅌ -->
        <!-- ㅌ -->
<a href="history01.html" class="letter letter-t">
  <span class="bar t-top"></span>
  <span class="bar t-mid"></span>
  <span class="bar t-bottom"></span>
  <span class="bar t-left"></span>
  <span class="hover-text text-history">탈네모틀의 역사</span>
</a>

        <!-- ㅏ -->
<a href="timeline01.html" class="letter letter-a">
  <span class="bar a-vertical"></span>
  <span class="bar a-horizontal"></span>
  <span class="hover-text text-timeline">타임라인</span>
</a>
        <!-- ㄹ -->
        <a href="designer.html" class="letter letter-r">
          <span class="bar r-top"></span>
          <span class="bar r-mid"></span>
          <span class="bar r-bottom"></span>
          <span class="bar r-left-top"></span>
          <span class="bar r-right-bottom"></span>
          <span class="hover-text text-designer">디자이너</span>
        </a>

      </div>
    </section>
  </main>
<img src="img/1.jpg">
<img src="img/2.jpg">
<img src="img/3.jpg">
<img src="img/4.jpg">
</body>
</html>
